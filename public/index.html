<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advait's Assignment Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080C18; font-family: 'Segoe UI', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const subjectColors = {
      "Mathematics":      { bg: "#FFF3E0", accent: "#E65100" },
      "English":          { bg: "#E8F5E9", accent: "#2E7D32" },
      "Biology":          { bg: "#E3F2FD", accent: "#1565C0" },
      "Chemistry":        { bg: "#EDE7F6", accent: "#4527A0" },
      "History":          { bg: "#FCE4EC", accent: "#AD1457" },
      "Physics":          { bg: "#E0F2F1", accent: "#00695C" },
      "Spanish":          { bg: "#FFFDE7", accent: "#F57F17" },
      "PE":               { bg: "#F3E5F5", accent: "#6A1B9A" },
      "Computer Science": { bg: "#E8EAF6", accent: "#283593" },
      default:            { bg: "#F5F5F5", accent: "#546E7A" },
    };

    function getColor(subject) {
      return subjectColors[subject] || subjectColors.default;
    }

    function getDaysUntil(dateStr) {
      const today = new Date(); today.setHours(0,0,0,0);
      const due   = new Date(dateStr); due.setHours(0,0,0,0);
      const diff  = Math.round((due - today) / 86400000);
      if (diff < 0)   return `${Math.abs(diff)}d ago`;
      if (diff === 0) return "Today";
      if (diff === 1) return "Tomorrow";
      return `${diff} days`;
    }

    function isUrgent(dateStr) {
      const today = new Date(); today.setHours(0,0,0,0);
      const due   = new Date(dateStr); due.setHours(0,0,0,0);
      return Math.round((due - today) / 86400000) <= 1;
    }

    function LoadingScreen() {
      return (
        <div style={{ minHeight:"100vh", background:"#080C18", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:18 }}>
          <div style={{ width:44, height:44, borderRadius:"50%", border:"3px solid rgba(49,130,206,0.15)", borderTopColor:"#4299E1", animation:"spin 0.75s linear infinite" }} />
          <div style={{ color:"#4A5568", fontSize:14 }}>Loading Advait's assignments…</div>
        </div>
      );
    }

    function ErrorScreen({ error, onRetry, loading }) {
      return (
        <div style={{ minHeight:"100vh", background:"#080C18", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 24px" }}>
          <div style={{ maxWidth:480, width:"100%", textAlign:"center" }}>
            <div style={{ fontSize:48, marginBottom:20 }}>📚</div>
            <h1 style={{ color:"white", fontSize:24, fontWeight:800, marginBottom:8 }}>Advait's Assignment Tracker</h1>
            <div style={{ background:"rgba(229,62,62,0.1)", border:"1px solid rgba(229,62,62,0.25)", borderRadius:12, padding:"14px 18px", marginBottom:24, textAlign:"left" }}>
              <div style={{ color:"#FC8181", fontWeight:700, fontSize:13, marginBottom:4 }}>⚠️ Could not load assignments</div>
              <div style={{ color:"#4A5568", fontSize:12 }}>{error}</div>
            </div>
            <button onClick={onRetry} disabled={loading} style={{ width:"100%", padding:"14px", background:"#2C5282", border:"none", borderRadius:12, color:"white", fontWeight:800, fontSize:15, cursor:"pointer" }}>
              {loading ? "Loading…" : "🔄 Try Again"}
            </button>
          </div>
        </div>
      );
    }

    function AssignmentCard({ a, onClick }) {
      const c = getColor(a.subject);
      const urgent = a.status === "upcoming" && isUrgent(a.dueDate);
      return (
        <div onClick={() => onClick(a)} style={{ background:"rgba(255,255,255,0.04)", border:`1px solid ${urgent ? "rgba(252,129,74,0.45)" : "rgba(255,255,255,0.07)"}`, borderRadius:15, padding:"15px 18px", marginBottom:9, cursor:"pointer", transition:"all 0.15s" }}
          onMouseEnter={e => { e.currentTarget.style.background="rgba(255,255,255,0.07)"; e.currentTarget.style.transform="translateY(-1px)"; }}
          onMouseLeave={e => { e.currentTarget.style.background="rgba(255,255,255,0.04)"; e.currentTarget.style.transform="translateY(0)"; }}
        >
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:14 }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:6, alignItems:"center" }}>
                <span style={{ background:c.bg, color:c.accent, fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20 }}>{a.subject}</span>
                {urgent && <span style={{ background:"rgba(252,129,74,0.15)", color:"#FC8149", fontSize:11, fontWeight:700, padding:"3px 9px", borderRadius:20 }}>⚡ Urgent</span>}
                {a.teacher && <span style={{ color:"#4A5568", fontSize:12 }}>{a.teacher}</span>}
              </div>
              <div style={{ fontWeight:700, fontSize:15, color:"#E2E8F0", marginBottom:5, lineHeight:1.3 }}>{a.title}</div>
              {a.description && <div style={{ fontSize:13, color:"#718096", marginBottom:5, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{a.description}</div>}
              <div style={{ fontSize:12, color:"#4A5568" }}>
                📅 {a.dueDate ? new Date(a.dueDate).toLocaleDateString("en-US", { month:"short", day:"numeric" }) : "—"}
                {a.dueTime ? ` · ${a.dueTime}` : ""}
                {a.points ? ` · ${a.points} pts` : ""}
              </div>
            </div>
            <div style={{ textAlign:"center", flexShrink:0, minWidth:64 }}>
              {a.status === "upcoming" && (
                <span style={{ background: urgent ? "rgba(229,62,62,0.18)" : "rgba(49,130,206,0.12)", color: urgent ? "#FC8181" : "#63B3ED", fontWeight:800, fontSize:12, padding:"6px 11px", borderRadius:20, whiteSpace:"nowrap" }}>{getDaysUntil(a.dueDate)}</span>
              )}
              {a.status === "submitted" && a.gradeLetter && (
                <>
                  <div style={{ fontSize:22, fontWeight:800, color: a.gradeLetter.startsWith("A") ? "#68D391" : a.gradeLetter.startsWith("B") ? "#F6AD55" : "#FC8181" }}>{a.gradeLetter}</div>
                  {a.grade && <div style={{ fontSize:11, color:"#4A5568" }}>{a.grade}</div>}
                </>
              )}
              {a.status === "missed" && (
                <>
                  <div style={{ fontSize:22, fontWeight:800, color:"#FC8181" }}>0</div>
                  <div style={{ fontSize:11, color:"#FC8181", fontWeight:700 }}>MISSED</div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    function Modal({ a, onClose }) {
      if (!a) return null;
      const c = getColor(a.subject);
      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:20 }} onClick={onClose}>
          <div style={{ background:"#111827", borderRadius:22, padding:26, maxWidth:450, width:"100%", border:"1px solid rgba(255,255,255,0.09)", boxShadow:"0 32px 80px rgba(0,0,0,0.7)" }} onClick={e => e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <span style={{ background:c.bg, color:c.accent, fontSize:12, fontWeight:700, padding:"4px 13px", borderRadius:20 }}>{a.subject}</span>
              <button onClick={onClose} style={{ background:"rgba(255,255,255,0.07)", border:"none", borderRadius:8, width:30, height:30, color:"#A0AEC0", fontSize:17, cursor:"pointer" }}>×</button>
            </div>
            <h2 style={{ color:"#E2E8F0", fontWeight:800, fontSize:18, marginBottom:10, lineHeight:1.3 }}>{a.title}</h2>
            {a.description && <p style={{ color:"#718096", fontSize:14, lineHeight:1.65, marginBottom:18 }}>{a.description}</p>}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:9 }}>
              {[
                ["DUE DATE", a.dueDate ? new Date(a.dueDate).toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" }) : "—"],
                ["DUE TIME", a.dueTime || "—"],
                ["TEACHER",  a.teacher || "—"],
                ["POINTS",   a.points ? `${a.points} pts` : "—"],
                ...(a.grade ? [["GRADE", `${a.grade} (${a.gradeLetter})`]] : []),
              ].map(([label, val]) => (
                <div key={label} style={{ background:"rgba(255,255,255,0.04)", borderRadius:11, padding:"11px 13px" }}>
                  <div style={{ fontSize:10, color:"#4A5568", fontWeight:700, letterSpacing:0.8, marginBottom:3 }}>{label}</div>
                  <div style={{ fontWeight:600, color:"#CBD5E0", fontSize:13 }}>{val}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function Dashboard({ assignments, lastUpdated, onRefresh, refreshing }) {
      const [tab, setTab]       = useState("upcoming");
      const [filter, setFilter] = useState("all");
      const [selected, setSelected] = useState(null);

      const upcoming  = assignments.filter(a => a.status === "upcoming").sort((a,b) => new Date(a.dueDate)-new Date(b.dueDate));
      const submitted = assignments.filter(a => a.status === "submitted").sort((a,b) => new Date(b.dueDate)-new Date(a.dueDate));
      const missed    = assignments.filter(a => a.status === "missed");
      const subjects  = ["all", ...new Set(assignments.map(a => a.subject))];
      const f = list  => filter === "all" ? list : list.filter(a => a.subject === filter);

      const gradedScores = submitted.filter(a => a.score && !isNaN(parseInt(a.score)));
      const avgGrade = gradedScores.length ? Math.round(gradedScores.reduce((s,a) => s + parseInt(a.score), 0) / gradedScores.length) : null;

      const tabs = [
        { id:"upcoming",  label:"Upcoming",  emoji:"📚", count:upcoming.length,  color:"#63B3ED" },
        { id:"submitted", label:"Submitted", emoji:"✅", count:submitted.length, color:"#68D391" },
        { id:"missed",    label:"Missed",    emoji:"❌", count:missed.length,    color:"#FC8181" },
      ];

      return (
        <div style={{ minHeight:"100vh", background:"#080C18" }}>
          <Modal a={selected} onClose={() => setSelected(null)} />

          {/* Header */}
          <div style={{ background:"rgba(255,255,255,0.025)", borderBottom:"1px solid rgba(255,255,255,0.06)", padding:"15px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
            <div>
              <h1 style={{ color:"white", margin:0, fontWeight:800, fontSize:19 }}>📚 Advait's Assignments</h1>
              <div style={{ color:"#4A5568", fontSize:12, marginTop:2 }}>
                10th Grade · Fremont USD · Synced {lastUpdated ? new Date(lastUpdated).toLocaleTimeString() : "—"}
              </div>
            </div>
            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              {[
                { label:"Due",    val:upcoming.length,  color:"#63B3ED" },
                { label:"Missed", val:missed.length,    color:missed.length > 0 ? "#FC8181" : "#68D391" },
                ...(avgGrade !== null ? [{ label:"Avg", val:`${avgGrade}%`, color:"#D6BCFA" }] : []),
              ].map(s => (
                <div key={s.label} style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:"8px 14px", textAlign:"center" }}>
                  <div style={{ color:s.color, fontWeight:800, fontSize:18, lineHeight:1 }}>{s.val}</div>
                  <div style={{ color:"#4A5568", fontSize:11, marginTop:2 }}>{s.label}</div>
                </div>
              ))}
              <button onClick={onRefresh} style={{ background:"rgba(49,130,206,0.12)", border:"1px solid rgba(49,130,206,0.25)", borderRadius:10, padding:"8px 14px", color:"#63B3ED", fontSize:13, fontWeight:700, cursor:"pointer" }}>
                <span style={{ display:"inline-block", animation: refreshing ? "spin 0.7s linear infinite" : "none" }}>↻</span>
                {!refreshing && " Refresh"}
              </button>
            </div>
          </div>

          <div style={{ maxWidth:700, margin:"0 auto", padding:"22px 20px" }}>
            {/* Tabs */}
            <div style={{ display:"flex", gap:6, marginBottom:18, flexWrap:"wrap" }}>
              {tabs.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{ background: tab===t.id ? "rgba(255,255,255,0.07)" : "transparent", border:`1px solid ${tab===t.id ? t.color+"50" : "transparent"}`, borderRadius:12, padding:"8px 17px", color: tab===t.id ? t.color : "#4A5568", fontWeight:700, fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", gap:7 }}>
                  {t.emoji} {t.label}
                  <span style={{ background: tab===t.id ? t.color : "rgba(255,255,255,0.06)", color: tab===t.id ? "#080C18" : "#4A5568", fontSize:11, borderRadius:20, padding:"1px 7px", fontWeight:800 }}>{t.count}</span>
                </button>
              ))}
            </div>

            {/* Subject filter */}
            <div style={{ display:"flex", gap:7, flexWrap:"wrap", marginBottom:18 }}>
              {subjects.map(s => (
                <button key={s} onClick={() => setFilter(s)} style={{ background: filter===s ? "rgba(99,179,237,0.12)" : "rgba(255,255,255,0.03)", border:`1px solid ${filter===s ? "rgba(99,179,237,0.35)" : "rgba(255,255,255,0.07)"}`, borderRadius:20, padding:"5px 14px", color: filter===s ? "#63B3ED" : "#718096", fontSize:13, fontWeight:600, cursor:"pointer" }}>
                  {s === "all" ? "All Classes" : s}
                </button>
              ))}
            </div>

            {/* Lists */}
            {tab === "upcoming" && (f(upcoming).length === 0
              ? <div style={{ textAlign:"center", padding:60, color:"#4A5568", fontSize:16 }}>🎉 Nothing due — all caught up!</div>
              : f(upcoming).map(a => <AssignmentCard key={a.id||a.title} a={a} onClick={setSelected} />)
            )}
            {tab === "submitted" && (f(submitted).length === 0
              ? <div style={{ textAlign:"center", padding:60, color:"#4A5568" }}>No submissions yet.</div>
              : f(submitted).map(a => <AssignmentCard key={a.id||a.title} a={a} onClick={setSelected} />)
            )}
            {tab === "missed" && (missed.length === 0
              ? <div style={{ textAlign:"center", padding:60, color:"#68D391", fontSize:16 }}>✅ No missed assignments!</div>
              : f(missed).map(a => <AssignmentCard key={a.id||a.title} a={a} onClick={setSelected} />)
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen]           = useState("loading");
      const [assignments, setAssignments] = useState([]);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [error, setError]             = useState(null);
      const [refreshing, setRefreshing]   = useState(false);

      async function load() {
        try {
          const res  = await fetch("/api/assignments", { signal: AbortSignal.timeout(90000) });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);
          setAssignments(data.assignments || []);
          setLastUpdated(data.lastUpdated);
          setScreen("dashboard");
          setError(null);
        } catch (err) {
          setError(err.message);
          setScreen("error");
        }
      }

      useEffect(() => { load(); }, []);

      async function refresh() {
        setRefreshing(true);
        await load();
        setRefreshing(false);
      }

      if (screen === "loading")   return <LoadingScreen />;
      if (screen === "error")     return <ErrorScreen error={error} onRetry={load} loading={refreshing} />;
      return <Dashboard assignments={assignments} lastUpdated={lastUpdated} onRefresh={refresh} refreshing={refreshing} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
